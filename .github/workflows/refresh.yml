name: Refresh League Data

on:
  schedule:
    - cron: "0 11 * * 2"  # Tuesday 11:00 UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch history
        run: node scripts/fetch-history.js

      - name: Fetch rosters
        run: node scripts/fetch-rosters.js

      - name: Fetch stats
        run: node scripts/fetch-stats.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          git diff --cached --quiet || git commit -m "chore: refresh league data [skip ci]"
          git push
