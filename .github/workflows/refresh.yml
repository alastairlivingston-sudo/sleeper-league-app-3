name: Refresh League Data

on:
  schedule:
    - cron: "0 8 * * *"   # daily 08:00 UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # commit refreshed data back to the repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Data fetches — season auto-detected, falls back to previous year in off-season
      - name: Fetch history (all seasons + positional breakdown)
        run: node scripts/fetch-history.js

      - name: Fetch rosters (most recent season with players)
        run: node scripts/fetch-rosters.js

      - name: Fetch stats (most recent season with games)
        run: node scripts/fetch-stats.js

      - name: Fetch FantasyCalc trade values (trimmed)
        run: node scripts/fetch-fc-values.js

      - name: Fetch trade history (Sleeper trades)
        run: node scripts/fetch-trades.js

      # Assemble the template from its partials (source of truth) and fail if the
      # committed monolith drifted from them.
      - name: Assemble + verify template
        run: |
          node scripts/build-template.js
          node scripts/build-template.js --check

      # Build derived data tables
      - name: Build lore index
        run: node scripts/build-lore.js

      - name: Build all-time aggregates
        run: node scripts/build-alltime.js

      # Rebuild self-contained artifact with fresh inlined data
      - name: Build commissioner.jsx
        run: node scripts/build-artifact.js

      # Validate the data contract before publishing — a failure aborts the
      # run so structurally-wrong data (e.g. a truncated season) is never pushed
      - name: Validate generated data
        run: node scripts/validate.js --fresh

      # Aggregation golden test — locks build-alltime.js math against a fixture.
      - name: Test aggregation math
        run: node scripts/test-alltime.js

      # Structural gate on the built artifact (REQUIREMENTS.md FR-*/TR-*): valid
      # inlined JSON, required components, no placeholders, size budget, etc.
      # Zero-dep — always runs. A failure means the artifact would fail to load.
      - name: Test artifact structure
        run: node scripts/test-artifact.js

      # User-journey gate (REQUIREMENTS.md UR-*): transpile + render <App/> in jsdom,
      # switch every tab, drive a chat send, confirm offline fallback. Needs dev deps,
      # so install them here (test-only — the pipeline itself stays zero-dependency).
      - name: Test artifact render (user journey)
        run: |
          npm install --no-save @babel/core @babel/preset-env @babel/preset-react react react-dom jsdom
          node scripts/test-render.js

      # Only commit when real data changed. Every run rewrites meta.generated /
      # BUILT_AT timestamps, so ignore those lines — otherwise the off-season
      # would commit daily no-op churn (this repo had 55 such commits).
      - name: Detect real data changes
        id: changes
        run: |
          if git diff -- docs/ \
               | grep -E '^[+-]' \
               | grep -vE '^(\+\+\+|---)' \
               | grep -v '"generated"' \
               | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Real data changes detected — will commit."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Only timestamps changed — skipping commit."
          fi

      - name: Commit updated data and artifact
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/*.json docs/lore/*.json docs/.nojekyll commissioner.jsx
          git commit -m "chore: refresh league data + rebuild artifact [skip ci]"
          git push
